apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-vllm-{{ lower .Values.vllm.model.label }}
  namespace: {{ .Release.Namespace | default .Values.namespace }}
  labels:
    {{- include "epp-vllm.labels" . | nindent 4 }}
    app.kubernetes.io/component: vllm
spec:
  replicas: {{ .Values.vllm.replicaCount }}
  selector:
    matchLabels:
      {{- include "epp-vllm.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: vllm
      {{- range $key, $val := .Values.vllm.podLabels }}
      {{ $key }}: {{ $val | quote }}
      {{- end }}
  template:
    metadata:
      labels:
        {{- include "epp-vllm.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: vllm
        {{- range $key, $val := .Values.vllm.podLabels }}
        {{ $key }}: {{ $val | quote }}
        {{- end }}
    spec:
      volumes:
        {{- if .Values.persistence.enabled }}
        - name: vllm-storage
          persistentVolumeClaim:
            claimName: {{ if .Values.persistence.name }}{{ .Values.persistence.name }}{{ else }}{{ include "epp-vllm.pvcName" . }}{{ end }}
        {{- end }}
        {{- if .Values.dshm.useEmptyDir }}
        - name: dshm
          emptyDir:
            medium: Memory
            sizeLimit: {{ .Values.dshm.sizeLimit }}
        {{- else if .Values.dshm.pvcName }}
        - name: dshm
          persistentVolumeClaim:
            claimName: {{ .Values.dshm.pvcName }}
        {{- end }}
      {{- include "epp-vllm.imagePullSecrets" (dict "componentSecrets" .Values.vllm.imagePullSecrets "globalSecrets" .Values.imagePullSecrets) | nindent 6 }}
      {{- with .Values.vllm.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.vllm.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: vllm
          image: {{ include "epp-vllm.vllmImage" . }}
          imagePullPolicy: {{ .Values.vllm.image.pullPolicy }}
          command:
            - /bin/sh
            - '-c'
          args:
            - |
              vllm serve {{ .Values.vllm.model.name }} \
              --host 0.0.0.0 \
              --port 8000 \
              --trust-remote-code \
              {{- if .Values.vllm.enableChunkedPrefill }}
              --enable-chunked-prefill \
              {{- else }}
              --no-enable-chunked-prefill \
              {{- end }}
              --max_num_batched_tokens {{ .Values.vllm.maxNumBatchedTokens }} \
              {{- if .Values.vllm.gpuMemoryUtilization }}
              --gpu-memory-utilization {{ .Values.vllm.gpuMemoryUtilization }} \
              {{- end }}
              {{- if .Values.vllm.tensorParallelSize }}
              --tensor-parallel-size {{ .Values.vllm.tensorParallelSize }} \
              {{- end }}
              {{- if .Values.vllm.model.maxModelLen }}
              --max_model_len {{ .Values.vllm.model.maxModelLen }} \
              {{- end }}
              --block-size {{ .Values.vllm.blockSize }} \
              --kv-events-config "{\"enable_kv_cache_events\":true,\"publisher\":\"zmq\",\"endpoint\":\"{{ include "epp-vllm.eppZmqUrl" . }}\",\"topic\":\"kv@${POD_IP}:8000@{{ .Values.vllm.model.name }}\"}" \
              --prefix-caching-hash-algo sha256_cbor \
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          livenessProbe:
            {{- toYaml .Values.vllm.livenessProbe | nindent 12 }}
          startupProbe:
            {{- toYaml .Values.vllm.startupProbe | nindent 12 }}
          env:
            - name: HOME
              value: {{ .Values.persistence.mountPath }}
            - name: HF_HOME
              value: {{ .Values.persistence.mountPath }}
            - name: POD_IP
              valueFrom:
                fieldRef:
                  apiVersion: v1
                  fieldPath: status.podIP
            - name: HF_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secret.name }}
                  key: {{ .Values.secret.key }}
            - name: PYTHONHASHSEED
              value: {{ .Values.pythonHashSeed | quote }}
            {{- range $key, $val := .Values.vllm.extraEnv }}
            - name: {{ $key }}
              value: {{ $val | quote }}
            {{- end }}
          resources:
            {{- toYaml .Values.vllm.resources | nindent 12 }}
          volumeMounts:
            {{- if .Values.persistence.enabled }}
            - name: vllm-storage
              mountPath: {{ .Values.persistence.mountPath }}
            {{- end }}
            {{- if or .Values.dshm.useEmptyDir .Values.dshm.pvcName }}
            - name: dshm
              mountPath: /dev/shm
            {{- end }}
          terminationMessagePath: /dev/termination-log
          terminationMessagePolicy: File
          securityContext:
            runAsNonRoot: false
      restartPolicy: Always
      terminationGracePeriodSeconds: 30
      dnsPolicy: ClusterFirst
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: "100%"
  revisionHistoryLimit: 10
  progressDeadlineSeconds: 1200
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-vllm-{{ lower .Values.vllm.model.label }}
  namespace: {{ .Release.Namespace | default .Values.namespace }}
  labels:
    {{- include "epp-vllm.labels" . | nindent 4 }}
    app.kubernetes.io/component: vllm
spec:
  selector:
    {{- include "epp-vllm.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: vllm
  ports:
    - name: http
      protocol: TCP
      port: 8000
      targetPort: http
