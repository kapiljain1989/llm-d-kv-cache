apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "epp-vllm.eppServiceName" . }}
  namespace: {{ .Release.Namespace | default .Values.namespace }}
  labels:
    {{- include "epp-vllm.labels" . | nindent 4 }}
    app.kubernetes.io/component: inference-scheduler
spec:
  replicas: {{ .Values.inferenceExtension.replicas }}
  selector:
    matchLabels:
      {{- include "epp-vllm.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: inference-scheduler
  template:
    metadata:
      labels:
        {{- include "epp-vllm.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: inference-scheduler
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
    spec:
      serviceAccountName: {{ include "epp-vllm.eppServiceName" . }}
      {{- include "epp-vllm.imagePullSecrets" (dict "componentSecrets" .Values.inferenceExtension.imagePullSecrets "globalSecrets" .Values.imagePullSecrets) | nindent 6 }}
      {{- with .Values.inferenceExtension.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      volumes:
        - name: plugins-config
          configMap:
            name: {{ include "epp-vllm.eppServiceName" . }}-config
        {{- with .Values.inferenceExtension.volumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      containers:
        - name: epp
          image: {{ include "epp-vllm.eppImage" . }}
          imagePullPolicy: {{ .Values.inferenceExtension.image.pullPolicy }}
          args:
            - --pool-name
            - {{ include "epp-vllm.poolName" . }}
            - --pool-namespace
            - {{ .Release.Namespace | default .Values.namespace }}
            - --pool-group
            - {{ .Values.inferenceExtension.poolGroup | default "inference.networking.x-k8s.io" }}
            - --grpc-port
            - {{ .Values.inferenceExtension.extProcPort | quote }}
            - --secure-serving=false
            {{- if .Values.inferenceExtension.pluginsConfigFile }}
            - --config-file
            - /config/{{ .Values.inferenceExtension.pluginsConfigFile }}
            {{- end }}
            {{- if .Values.inferenceExtension.monitoring }}
            {{- if .Values.inferenceExtension.monitoring.interval }}
            - --refresh-metrics-interval
            - {{ .Values.inferenceExtension.monitoring.interval | quote }}
            {{- end }}
            {{- end }}
            {{- range $key, $val := .Values.inferenceExtension.flags }}
            - --{{ $key }}={{ $val }}
            {{- end }}
          ports:
            - name: grpc
              containerPort: {{ .Values.inferenceExtension.extProcPort }}
              protocol: TCP
            - name: metrics
              containerPort: 9090
              protocol: TCP
            {{- with .Values.inferenceExtension.extraContainerPorts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            {{- with .Values.inferenceExtension.env }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- with .Values.inferenceExtension.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: plugins-config
              mountPath: /config
              readOnly: true
            {{- with .Values.inferenceExtension.volumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          readinessProbe:
            grpc:
              port: 9003
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            grpc:
              port: 9003
            initialDelaySeconds: 15
            periodSeconds: 20
        {{- if .Values.inferenceExtension.sidecar.enabled }}
        - name: {{ .Values.inferenceExtension.sidecar.name }}
          image: {{ .Values.inferenceExtension.sidecar.image }}
          imagePullPolicy: {{ .Values.inferenceExtension.sidecar.imagePullPolicy }}
          {{- with .Values.inferenceExtension.sidecar.env }}
          env:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.inferenceExtension.sidecar.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.inferenceExtension.sidecar.volumeMounts }}
          volumeMounts:
            {{- toYaml . | nindent 12 }}
          {{- end }}
        {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "epp-vllm.eppServiceName" . }}
  namespace: {{ .Release.Namespace | default .Values.namespace }}
  labels:
    {{- include "epp-vllm.labels" . | nindent 4 }}
    app.kubernetes.io/component: inference-scheduler
spec:
  selector:
    {{- include "epp-vllm.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: inference-scheduler
  ports:
    - name: grpc
      protocol: TCP
      port: {{ .Values.inferenceExtension.extProcPort }}
      targetPort: grpc
    - name: metrics
      protocol: TCP
      port: 9090
      targetPort: metrics
    {{- with .Values.inferenceExtension.extraServicePorts }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
