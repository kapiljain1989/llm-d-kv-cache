apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "epp-vllm.eppServiceName" . }}
  namespace: {{ .Release.Namespace | default .Values.namespace }}
  labels:
    {{- include "epp-vllm.labels" . | nindent 4 }}
    app.kubernetes.io/component: inference-scheduler
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "epp-vllm.eppServiceName" . }}
  namespace: {{ .Release.Namespace | default .Values.namespace }}
  labels:
    {{- include "epp-vllm.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["discovery.k8s.io"]
    resources: ["endpointslices"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["authentication.k8s.io"]
    resources: ["tokenreviews"]
    verbs: ["create"]
  - apiGroups: ["authorization.k8s.io"]
    resources: ["subjectaccessreviews"]
    verbs: ["create"]
  # inference.networking.x-k8s.io resources (v1alpha2)
  - apiGroups: ["inference.networking.x-k8s.io"]
    resources: ["inferencepools", "inferencemodels", "inferencemodelrewrites", "inferenceobjectives"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["inference.networking.x-k8s.io"]
    resources: ["inferencepools/status"]
    verbs: ["update", "patch"]
  # inference.networking.k8s.io resources (GA)
  - apiGroups: ["inference.networking.k8s.io"]
    resources: ["inferencepools", "inferencemodels"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["inference.networking.k8s.io"]
    resources: ["inferencepools/status"]
    verbs: ["update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "epp-vllm.eppServiceName" . }}
  namespace: {{ .Release.Namespace | default .Values.namespace }}
  labels:
    {{- include "epp-vllm.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ include "epp-vllm.eppServiceName" . }}
    namespace: {{ .Release.Namespace | default .Values.namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "epp-vllm.eppServiceName" . }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "epp-vllm.eppServiceName" . }}-{{ .Release.Namespace | default .Values.namespace }}
  labels:
    {{- include "epp-vllm.labels" . | nindent 4 }}
rules:
  # inference.networking.x-k8s.io resources (v1alpha2)
  - apiGroups: ["inference.networking.x-k8s.io"]
    resources: ["inferencepools", "inferencemodels", "inferencemodelrewrites", "inferenceobjectives"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["inference.networking.x-k8s.io"]
    resources: ["inferencepools/status"]
    verbs: ["update", "patch"]
  # inference.networking.k8s.io resources (GA)
  - apiGroups: ["inference.networking.k8s.io"]
    resources: ["inferencepools", "inferencemodels"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["inference.networking.k8s.io"]
    resources: ["inferencepools/status"]
    verbs: ["update", "patch"]
  # Core resources
  - apiGroups: ["discovery.k8s.io"]
    resources: ["endpointslices"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["authentication.k8s.io"]
    resources: ["tokenreviews"]
    verbs: ["create"]
  - apiGroups: ["authorization.k8s.io"]
    resources: ["subjectaccessreviews"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "epp-vllm.eppServiceName" . }}-{{ .Release.Namespace | default .Values.namespace }}
  labels:
    {{- include "epp-vllm.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ include "epp-vllm.eppServiceName" . }}
    namespace: {{ .Release.Namespace | default .Values.namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "epp-vllm.eppServiceName" . }}-{{ .Release.Namespace | default .Values.namespace }}
